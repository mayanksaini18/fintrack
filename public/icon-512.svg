<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- rounded background -->
  <rect width="512" height="512" rx="112" fill="#0ea5e9"/>
  <!-- wallet body -->
  <rect x="52" y="144" width="408" height="290" rx="48" fill="#0ea5e9"/>
  <!-- top flap -->
  <rect x="52" y="144" width="408" height="102" rx="48" fill="#0284c7"/>
  <rect x="52" y="208" width="408" height="38" fill="#0284c7"/>
  <!-- card strip detail -->
  <rect x="96" y="166" width="182" height="44" rx="14" fill="#fff" fill-opacity="0.18"/>
  <!-- card chip -->
  <rect x="108" y="178" width="36" height="24" rx="7" fill="#fff" fill-opacity="0.35"/>
  <!-- magnetic stripe -->
  <line x1="96" y1="258" x2="376" y2="258" stroke="#0369a1" stroke-width="20"/>
  <!-- coin pocket outer -->
  <circle cx="396" cy="348" r="76" fill="#0284c7"/>
  <!-- coin pocket inner -->
  <circle cx="396" cy="348" r="56" fill="#0369a1"/>
  <!-- rupee symbol -->
  <text x="396" y="370" font-family="system-ui,sans-serif" font-size="64" font-weight="800" fill="#f59e0b" text-anchor="middle">&#x20B9;</text>
  <!-- shine lines -->
  <line x1="96" y1="310" x2="268" y2="310" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-opacity="0.25"/>
  <line x1="96" y1="342" x2="194" y2="342" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-opacity="0.15"/>
</svg>
