<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <!-- rounded background -->
  <rect width="192" height="192" rx="42" fill="#0ea5e9"/>
  <!-- wallet body -->
  <rect x="20" y="54" width="152" height="108" rx="18" fill="#0ea5e9"/>
  <!-- top flap -->
  <rect x="20" y="54" width="152" height="38" rx="18" fill="#0284c7"/>
  <rect x="20" y="78" width="152" height="14" fill="#0284c7"/>
  <!-- card strip detail -->
  <rect x="36" y="62" width="68" height="16" rx="5" fill="#fff" fill-opacity="0.18"/>
  <!-- card chip -->
  <rect x="40" y="66" width="13" height="9" rx="3" fill="#fff" fill-opacity="0.35"/>
  <!-- magnetic stripe -->
  <line x1="36" y1="96" x2="140" y2="96" stroke="#0369a1" stroke-width="7"/>
  <!-- coin pocket outer -->
  <circle cx="148" cy="130" r="28" fill="#0284c7"/>
  <!-- coin pocket inner -->
  <circle cx="148" cy="130" r="20" fill="#0369a1"/>
  <!-- ₹ symbol -->
  <text x="148" y="138" font-family="system-ui,sans-serif" font-size="24" font-weight="800" fill="#f59e0b" text-anchor="middle">₹</text>
  <!-- shine lines -->
  <line x1="36" y1="116" x2="100" y2="116" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-opacity="0.25"/>
  <line x1="36" y1="128" x2="72" y2="128" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-opacity="0.15"/>
</svg>
